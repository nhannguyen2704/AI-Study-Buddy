{% extends "base.html" %}

{% block title %}Đăng ký tài khoản - AI Study Buddy{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 md:p-10 rounded-3xl border border-slate-100 shadow-xl">
    <div>
      <h2 class="text-center text-3xl font-extrabold text-slate-900 tracking-tight">
        Tạo tài khoản mới
      </h2>
      <p class="mt-2 text-center text-sm text-slate-600">
        Đã có tài khoản? 
        <a href="/login" class="font-medium text-sky-600 hover:text-sky-500 underline decoration-2">
          Đăng nhập tại đây
        </a>
      </p>
    </div>
    
    <form class="mt-8 space-y-6" action="/register" method="POST">
      <div class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-semibold text-slate-700 mb-1">Họ và tên</label>
          <input id="username" name="username" type="text" autocomplete="name" required 
                 class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 transition-all duration-200" 
                 >
        </div>
        <div>
          <label for="email-address" class="block text-sm font-semibold text-slate-700 mb-1">Địa chỉ Email</label>
          <input id="email-address" name="email" type="email" autocomplete="email" required 
                 class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 transition-all duration-200" 
                 >
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Mật khẩu</label>
          <input id="password" name="password" type="password" required 
                 class="appearance-none rounded-xl relative block w-full px-4 py-3.5 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 transition-all duration-200" 
                 placeholder="Ít nhất 6 ký tự">
        </div>
      </div>

      <div class="flex items-center">
        <input id="terms" name="terms" type="checkbox" required
               class="h-4 w-4 text-sky-600 focus:ring-sky-500 border-slate-300 rounded">
        <label for="terms" class="ml-2 block text-sm text-slate-600">
          Tôi đồng ý với các <a href="#" class="text-sky-600 underline">Điều khoản dịch vụ</a> và <a href="#" class="text-sky-600 underline">Chính sách bảo mật</a>.
        </label>
      </div>

      <div>
        <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-lg font-bold rounded-2xl text-white bg-slate-950 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transform hover:-translate-y-0.5 transition-all duration-200 shadow-lg shadow-slate-950/20">
          Đăng ký miễn phí ngay
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
