<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Study Buddy{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="bg-white shadow-sm">
    <div class="container mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-bold text-slate-900">AI Study Buddy</a>
      <nav class="space-x-4 text-slate-700 hidden md:block">
        <a href="/" class="hover:text-slate-900">Trang chủ</a>
        <a href="/upload_doc" class="hover:text-slate-900">Tải lên</a>
        <a href="#features" class="hover:text-slate-900">Tính năng</a>
        <a href="#contact" class="hover:text-slate-900">Liên hệ</a>
      </nav>
      <a href="/upload_doc" class="inline-block px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700">Bắt đầu</a>
    </div>
  </header>

  <main class="container mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white mt-16 border-t">
    <div class="container mx-auto px-4 py-8 text-sm text-slate-600 flex flex-col md:flex-row justify-between items-center">
      <div>© {{ (now().year) if now is defined else '' }} AI Study Buddy</div>
      <div class="mt-3 md:mt-0">Made with ❤️ · <a href="#contact" class="underline">Contact</a></div>
    </div>
  </footer>
</body>
</html>
